name: Ruff

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ master ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check .
        env:
          # Configure Ruff to fail the build if any issues are found
          RUFF_FAIL_ON_ERROR: true

      - name: Run Ruff with fixes
        run: ruff check . --fix
        env:
          # Configure Ruff to fail the build if any issues are found
          RUFF_FAIL_ON_ERROR: true

      - name: Run Ruff with fixes (unsafe)
        run: ruff check . --fix --unsafe-fixes
        env:
          # Configure Ruff to fail the build if any issues are found
          RUFF_FAIL_ON_ERROR: true
